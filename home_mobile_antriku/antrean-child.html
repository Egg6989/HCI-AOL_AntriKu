<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antriku - Live Status</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container main-content" style="max-width: 600px">
      <div style="margin-bottom: 16px">
        <a
          href="antrean-today.html"
          style="text-decoration: none; color: var(--hex-primary-dark)"
          >← Kembali</a
        >
      </div>

      <div class="standalone-status-card">
        <p class="tiny-label text-center">NOW SERVING</p>
        <div class="giant-headline-number text-center">A-12</div>

        <div class="split-info-row">
          <div class="text-center item-split">
            <span class="tiny-label">Perkiraan sisa waktu</span>
            <p class="bold-stat-text highlight-orange">15 menit tersisa</p>
          </div>
          <div class="text-center item-split">
            <span class="tiny-label">Status Anda</span>
            <p class="bold-stat-text">Menunggu</p>
          </div>
        </div>

        <div style="margin-top: 24px">
          <button class="btn-action-slate">Batalkan Reservasi</button>
        </div>
      </div>
    </main>

    <script src="animate.js"></script>
  </body>
</html>
