<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antriku - Business Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container auth-page-wrapper">
      <a href="index.html" class="btn-back-icon"> ← </a>
      <div class="auth-split-container">
        <div class="auth-branding-banner">
          <h1
            class="brand-logo"
            style="color: var(--hex-bg-beige); font-size: 40px"
          >
            Antriku
          </h1>
          <p style="color: rgba(255, 255, 255, 0.7); font-weight: 300">
            Panel Dashboard Operasional Toko Mitra.
          </p>
        </div>
        <div class="auth-form-container">
          <div class="auth-segment-switcher">
            <button
              class="segment-btn"
              onclick="location.href = 'login-customer.html'"
            >
              Pelanggan
            </button>
            <button
              class="segment-btn active"
              onclick="location.href = 'login-business.html'"
            >
              Bisnis
            </button>
          </div>
          <div class="auth-action-toggle">
            <span class="action-item active">Masuk Bisnis</span>
            <span
              class="action-item"
              onclick="location.href = 'register-business.html'"
              >Daftar Mitra</span
            >
          </div>
          <form action="dashboard-admin.html" id="loginForm">
            <div class="form-input-group">
              <label class="input-label-tag">ID Toko / Email Mitra</label>
              <input
                type="email"
                id="emailInput"
                class="field-control"
                placeholder="mitra@email.com"
                required
              />
              <div id="emailFeedback" class="validation-feedback">Format email tidak valid.</div>
            </div>
            <div class="form-input-group">
              <label class="input-label-tag">Kata Sandi</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="passwordInput"
                  class="field-control"
                  placeholder="••••••••"
                  required
                />
                <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility()">
                  <i id="passwordToggleIcon" data-lucide="eye"></i>
                </button>
              </div>
              <div id="passwordFeedback" class="validation-feedback">Kata sandi minimal 8 karakter.</div>
            </div>
            <button type="submit" class="btn-action-gold">
              Masuk Ke Dasbor
            </button>
            <a href="index.html" class="btn-action-slate" style="background: transparent; color: var(--hex-text-muted); border: 1px solid var(--hex-border-muted); margin-top: 12px; display: block; text-align: center; text-decoration: none; padding: 14px; border-radius: 8px; font-size: 15px; font-family: Outfit;">Batal</a>
          </form>
        </div>
      </div>
    </div>
    <script>
      function togglePasswordVisibility() {
        const passwordInput = document.getElementById("passwordInput");
        const icon = document.getElementById("passwordToggleIcon");
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          icon.setAttribute("data-lucide", "eye-off");
        } else {
          passwordInput.type = "password";
          icon.setAttribute("data-lucide", "eye");
        }
        lucide.createIcons();
      }

      document.getElementById("loginForm").addEventListener("submit", function (e) {
        let valid = true;
        const email = document.getElementById("emailInput");
        const emailFeedback = document.getElementById("emailFeedback");
        const password = document.getElementById("passwordInput");
        const passwordFeedback = document.getElementById("passwordFeedback");

        if (!email.value.includes("@")) {
          email.classList.add("invalid");
          emailFeedback.style.display = "block";
          valid = false;
        } else {
          email.classList.remove("invalid");
          emailFeedback.style.display = "none";
        }

        if (password.value.length < 8) {
          password.classList.add("invalid");
          passwordFeedback.style.display = "block";
          valid = false;
        } else {
          password.classList.remove("invalid");
          passwordFeedback.style.display = "none";
        }

        if (!valid) {
          e.preventDefault();
        }
      });
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
  </body>
</html>
