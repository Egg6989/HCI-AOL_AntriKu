<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antriku - Konfirmasi Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container main-content" style="max-width: 600px;">
        <h1 class="display-heading" style="margin-bottom: 24px;">Konfirmasi Booking</h1>
        <div class="standalone-status-card">
            <div class="invoice-details-list">
                <div class="flex-space-between invoice-row">
                    <span class="muted-small-text">Barbershop</span>
                    <span class="bold-stat-text" style="font-size:15px">Barber Cut</span>
                </div>
                <div class="flex-space-between invoice-row">
                    <span class="muted-small-text">Layanan</span>
                    <span class="bold-stat-text" style="font-size:15px">Regular Cut</span>
                </div>
                <div class="flex-space-between invoice-row">
                    <span class="muted-small-text">Jadwal</span>
                    <span class="bold-stat-text" style="font-size:15px">30 Mei 2026 • 13:00</span>
                </div>
                <div class="flex-space-between invoice-row total-row" style="margin-top:16px; padding-top:16px; border-top:1px dashed var(--hex-border-muted);">
                    <span class="bold-stat-text">Total Bayar</span>
                    <span class="huge-number-display" style="font-size: 24px;">Rp 40.000</span>
                </div>
            </div>
            <button id="confirmBtn" class="btn-action-gold" style="margin-top: 24px;" onclick="processBooking()">Konfirmasi & Ambil Antrean</button>
            <a href="pilih-jadwal.html" class="btn-action-slate" style="background: transparent; color: var(--hex-text-muted); border: 1px solid var(--hex-border-muted); margin-top: 12px; display: block; text-align: center; text-decoration: none; padding: 14px; border-radius: 8px; font-size: 15px; font-family: Outfit;">Batal</a>
        </div>
    </main>
    <div id="successOverlay" class="success-overlay">
      <div class="success-card">
        <div class="success-icon-circle"><i data-lucide="check"></i></div>
        <h2 class="sub-display-heading" style="font-size: 24px; margin-bottom: 8px;">Booking Berhasil</h2>
        <p class="muted-small-text" style="font-size: 15px;">Antrean Anda telah dikonfirmasi.</p>
      </div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
      function processBooking() {
        if (confirm("Apakah detail reservasi Anda sudah benar?")) {
          const btn = document.getElementById("confirmBtn");
          btn.classList.add("loading");
          btn.innerHTML = '<div class="spinner"></div>Memproses...';
          setTimeout(() => {
            document.getElementById("successOverlay").classList.add("active");
            lucide.createIcons();
            setTimeout(() => {
              window.location.href = "antrean-today.html";
            }, 1500);
          }, 1000);
        }
      }
    </script>
</body>
</html>
