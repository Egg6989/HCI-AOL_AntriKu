<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antriku - Konfirmasi Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container main-content" style="max-width: 600px;">
        <h1 class="display-heading" style="margin-bottom: 24px;">Konfirmasi Booking</h1>
        <div class="standalone-status-card">
            <div class="invoice-details-list">
                <div class="flex-space-between invoice-row">
                    <span class="muted-small-text">Barbershop</span>
                    <span class="bold-stat-text" style="font-size:15px">Barber Cut</span>
                </div>
                <div class="flex-space-between invoice-row">
                    <span class="muted-small-text">Layanan</span>
                    <span class="bold-stat-text" style="font-size:15px">Regular Cut</span>
                </div>
                <div class="flex-space-between invoice-row">
                    <span class="muted-small-text">Jadwal</span>
                    <span class="bold-stat-text" style="font-size:15px">30 Mei 2026 • 13:00</span>
                </div>
                <div class="flex-space-between invoice-row total-row" style="margin-top:16px; padding-top:16px; border-top:1px dashed var(--hex-border-muted);">
                    <span class="bold-stat-text">Total Bayar</span>
                    <span class="huge-number-display" style="font-size: 24px;">Rp 40.000</span>
                </div>
            </div>
            <button class="btn-action-gold" style="margin-top: 24px;" onclick="location.href='antrean-today.html'">Konfirmasi & Ambil Antrean</button>
        </div>
    </main>
</body>
</html>
