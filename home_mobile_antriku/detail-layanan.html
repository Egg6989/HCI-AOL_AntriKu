<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antriku - Detail Layanan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container main-content">
        <div class="showcase-cover-frame"></div>
        <div class="desktop-split-layout">
            <div class="left-primary-column">
                <h1 class="display-heading">Barber Cut</h1>
                <p class="muted-small-text" style="margin-bottom: 24px;">Jl. Palmerah No. 12, Jakarta Barat</p>
                <h3 class="sub-display-heading" style="margin-bottom: 16px;">Layanan Tersedia</h3>
                <div class="service-catalogue-card">
                    <div>
                        <h4 style="font-weight:600;">Regular Cut</h4>
                        <p class="muted-small-text">Potong rambut + cuci bilas</p>
                    </div>
                    <div class="text-right">
                        <div class="price-text">Rp 40.000</div>
                        <button class="btn-action-gold-compact" onclick="location.href='pilih-jadwal.html'">Pilih</button>
                    </div>
                </div>
            </div>
            <div class="right-secondary-column">
                <div class="standalone-status-card" style="padding: 20px;">
                    <h4 class="sub-display-heading" style="font-size:18px; margin-bottom:12px;">Jam Operasional</h4>
                    <p class="muted-small-text" style="margin-bottom:6px;">Senin - Jumat: 09:00 - 21:00</p>
                    <p class="muted-small-text highlight-green">Sabtu - Minggu: 09:00 - 22:00</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
